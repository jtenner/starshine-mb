name: "README API Sync"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "README.mbt.md"
      - "scripts/**"
      - "package.json"
      - "src/**/pkg.generated.mbti"
  push:
    branches:
      - main
    paths:
      - "README.mbt.md"
      - "scripts/**"
      - "package.json"
      - "src/**/pkg.generated.mbti"

jobs:
  readme-api-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Verify README API signatures
        run: |
          bun validate readme-api-sync
