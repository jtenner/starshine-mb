name: "Fuzz Suites"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "scripts/run-full-test.sh"
      - "scripts/run-fuzz.sh"
      - "moon.mod.json"
      - "moon.pkg.json"
      - ".github/workflows/fuzz.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/run-full-test.sh"
      - "scripts/run-fuzz.sh"
      - "moon.mod.json"
      - "moon.pkg.json"
      - ".github/workflows/fuzz.yml"
  schedule:
    - cron: "0 7 * * 1"

jobs:
  fuzz-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Run full MoonBit test gate (check + tests + fuzz)
        run: |
          bash scripts/run-full-test.sh ci 0x5eed wasm-gc

  fuzz-stress-native:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Run fuzz suites (stress profile, native target)
        run: |
          bash scripts/run-fuzz.sh stress all 0x5eed5eed native
