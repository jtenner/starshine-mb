name: "Fuzz Suites"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  fuzz-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Run fuzz suites (ci profile)
        run: |
          bash scripts/run-fuzz.sh ci all 0x5eed wasm-gc

  fuzz-stress-native:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Run fuzz suites (stress profile, native target)
        run: |
          bash scripts/run-fuzz.sh stress all 0x5eed5eed native
